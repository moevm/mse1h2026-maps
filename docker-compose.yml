services:
  server:
    build: .
    image: mse1h2026-maps-server:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DB_HOST: ${DOCKER_DB_HOST:-postgres}
      DB_PORT: ${DOCKER_DB_PORT:-5432}
      NEO_URI: ${DOCKER_NEO_URI:-bolt://neo4j:7687}
      HF_HOME: ${DOCKER_HF_HOME:-/cache/hf}
      TRANSFORMERS_CACHE: ${DOCKER_TRANSFORMERS_CACHE:-/cache/hf}
    volumes:
      - huggingface_cache:${DOCKER_HF_HOME:-/cache/hf}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  postgres:
    image: postgres:18-bookworm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-mapsdb}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGETHAT}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s

  neo4j:
    image: neo4j:5.26.23-community-ubi10
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:7474:7474"
    environment:
      NEO4J_AUTH: ${NEO_USER:-neo4j}/${NEO_PASSWORD:-12345678}
      NEO_USER: ${NEO_USER:-neo4j}
      NEO_PASSWORD: ${NEO_PASSWORD:-12345678}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO_USER} -p $${NEO_PASSWORD} 'RETURN 1'"]
      interval: 5s
      timeout: 5s

volumes:
  postgres_data:
  neo4j_data:
  huggingface_cache:
