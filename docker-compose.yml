services:
  server:
    build: .
    image: mse1h2026-maps-server:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DJANGO_SECRET: ${DJANGO_SECRET}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432

      NEO_URI: bolt://neo4j:7687
      NEO_USER: ${NEO_USER}
      NEO_PASSWORD: ${NEO_PASSWORD}

      HF_HOME: /cache/hf
      TRANSFORMERS_CACHE: /cache/hf
    volumes:
      - .:/app
      - huggingface_cache:/cache/hf
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  postgres:
    image: postgres:18-bookworm
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s

  neo4j:
    image: neo4j:5.26.23-community-ubi10
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: ${NEO_USER}/${NEO_PASSWORD}
      NEO_USER: ${NEO_USER}
      NEO_PASSWORD: ${NEO_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO_USER} -p $${NEO_PASSWORD} 'RETURN 1'"]
      interval: 5s
      timeout: 5s

volumes:
  postgres_data:
  neo4j_data:
  huggingface_cache:
